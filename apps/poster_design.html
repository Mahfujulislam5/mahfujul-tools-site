<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Professional Eid Editor by Raju</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Tiro+Bangla&family=Anek+Bangla:wght@400;700&family=Shokuntola&family=Galada&family=Lobster&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #111827; 
            --primary: #38bdf8; /* আগের ভার্সনের মতো উজ্জ্বল সায়ান/স্কাই ব্লু */
            --glow: rgba(56, 189, 248, 0.5); 
            --text-light: #f3f4f6; 
            --text-muted: #9ca3af; 
            --panel-bg: #1f2937; 
            --panel-border: #374151;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: var(--dark-bg); font-family: 'Hind Siliguri', sans-serif; color: var(--text-light); }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        .app-header { flex-shrink: 0; background: var(--panel-bg); border-bottom: 1px solid var(--panel-border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; }
        .app-header h1 { font-family: 'Lobster', cursive; font-size: 24px; color: var(--primary); margin: 0; text-shadow: 0 0 8px var(--glow); }
        
        .main-content { flex-grow: 1; display: flex; min-height: 0; }
        .poster-preview-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 1.5rem; position: relative; }
        #poster-container {
            position: relative; width: 100%; max-width: 550px; 
            background-color: #fff;
            background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            transition: aspect-ratio 0.4s ease; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        .controls-panel { flex-shrink: 0; width: 360px; background: var(--panel-bg); border-left: 1px solid var(--panel-border); overflow-y: auto; }
        .control-section { border-bottom: 1px solid var(--panel-border); }
        .control-section summary { font-size: 16px; font-weight: bold; padding: 15px 20px; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .control-section summary::-webkit-details-marker { display: none; }
        .control-section summary:after { content: '›'; font-size: 24px; transition: transform 0.2s; transform: rotate(90deg); }
        .control-section[open] summary:after { transform: rotate(-90deg); }
        .control-section-content { padding: 0 20px 20px 20px; }
        
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--panel-border); border-radius: 5px; background-color: #374151; color: var(--text-light); }
        input[type="color"] { padding: 2px; height: 40px; }
        
        .btn { padding: 10px 15px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s; text-align: center; border: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #475569; color: var(--text-light); }
        .btn:hover { background: #64748b; }
        .btn.active, .layer-btn.active { background: var(--primary); color: var(--dark-bg); box-shadow: 0 0 10px var(--glow); }
        .btn-primary { background: var(--primary); color: var(--dark-bg); }
        
        .frame-selection { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; }
        .frame-option { width: 100%; height: 60px; border: 3px solid transparent; border-radius: 8px; cursor: pointer; object-fit: contain; background-color: rgba(0,0,0,0.2); }
        .frame-option.active { border-color: var(--primary); transform: scale(1.05); }
        
        #adjustment-controls { display: none; }
        .adjustment-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .adjustment-grid .btn svg { width: 18px; height: 18px; }
        
        .resizable-draggable { position: absolute; box-sizing: border-box; user-select: none; touch-action: none; will-change: transform; border: 2px solid transparent; transition: border-color 0.2s; }
        .resizable-draggable.selected { border-color: var(--primary); }
        #user-image-container { top: 25%; left: 25%; width: 50%; height: 50%; z-index: 1; display: none; }
        #user-image { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        #frame-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .text-element { padding: 5px 10px; font-weight: bold; text-align: center; }
        #name-text { top: 80%; left: 50%; transform: translateX(-50%); width: 200px; font-size: 30px; color: #FFFFFF; text-shadow: 2px 2px 4px #000; z-index: 12; }
        #status-text { top: 10%; left: 50%; transform: translateX(-50%); width: 300px; font-size: 35px; color: #333333; z-index: 11; }
        
        .watermark { position: absolute; bottom: 12px; right: 12px; padding: 5px 12px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); color: var(--primary); text-shadow: 0 0 5px var(--glow); font-size: 13px; font-weight: bold; border-radius: 5px; z-index: 15; border: 1px solid rgba(56, 189, 248, 0.2); }

        .app-footer { text-align: center; padding: 10px; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--panel-border); }
        
        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .controls-panel { width: 100%; max-height: 45vh; border-left: none; border-bottom: 1px solid var(--panel-border); order: 2; }
            .poster-preview-area { order: 1; flex-grow: 1; }
            .app-container { flex-direction: column; }
            .app-header { order: 1; }
            .main-content { order: 2; }
            .app-footer { order: 3; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header">
            <h1>Eid Editor Pro</h1>
            <button id="download-btn" class="btn btn-primary">Download Poster</button>
        </header>

        <!-- MAIN CONTENT (EDITOR + CONTROLS) -->
        <main class="main-content">
            <div class="poster-preview-area">
                <div id="poster-container" style="aspect-ratio: 1 / 1;">
                    <div id="user-image-container" class="resizable-draggable"><img id="user-image" src=""></div>
                    <img id="frame-image" src="">
                    <div id="status-text" class="resizable-draggable text-element">ঈদ মোবারক</div>
                    <div id="name-text" class="resizable-draggable text-element">আপনার নাম</div>
                    <div class="watermark">Make with Raju</div>
                </div>
            </div>
            
            <aside class="controls-panel">
                <details class="control-section" open>
                    <summary>Layers & Adjustments</summary>
                    <div class="control-section-content">
                        <div class="control-group">
                            <label>ফাইল আপলোড করুন</label>
                            <input type="file" id="image-upload" accept="image/*" style="background: #475569; text-align: center;">
                        </div>
                        <div class="control-group">
                            <label>লেয়ার সিলেক্ট করুন</label>
                            <div id="layers-panel" class="adjustment-grid">
                                <button class="btn layer-btn" data-target="#user-image-container"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.86 8.86l-3 3.87L9 13.14 6 17h12l-3.86-5.14z"></path></svg> ছবি</button>
                                <button class="btn layer-btn" data-target="#name-text"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M5 4h14v2H5zm10.1 7.36c.23-.23.39-.52.47-.85h-3.14c.08.33.24.62.47.85s.53.38.87.43.71.05 1.05-.08.66-.33.91-.58.42-.56.52-.91.12-.73.07-1.1-.18-.71-.43-1.01-.56-.52-.91-.68-.73-.24-1.12-.24-1.15.08-1.59.43L9.2 6.02C10.08 5.39 11.23 5 12.5 5c1.47 0 2.75.52 3.76 1.56S18 8.87 18 10.3c0 .9-.22 1.7-.65 2.4-.43.7-.99 1.25-1.68 1.66-.69.4-1.48.66-2.37.76v.38h-1.5v-.55c1.56-.16 2.88-.72 3.96-1.7.35-.32.63-.7.82-1.14H12.5v-1.5h5.08c-.08-.34-.23-.65-.45-.92s-.51-.48-.86-.62-.75-.21-1.17-.21c-.48 0-.91.08-1.29.25-.38.17-.69.4-.94.7l-1.06-1.06c.4-.42.88-.73 1.44-.95.56-.22 1.17-.33 1.83-.33s1.29.13 1.88.4c.59.27 1.07.64 1.44 1.13s.65.98.83 1.54.27 1.12.27 1.71c0 1.1-.26 2.08-.79 2.94s-1.28 1.57-2.24 2.13-2.1.84-3.4.84c-1.48 0-2.8-.4-4-1.22l1.06-1.06c.86.6 1.85.91 2.94.91.75 0 1.43-.17 2.03-.5.6-.33 1.1-.78 1.5-1.34z"></path></svg> নাম</button>
                                <button class="btn layer-btn" data-target="#status-text"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M4 18h16v-2H4v2zm0-5h16v-2H4v2zm0-5h16V6H4v2z"></path></svg> বার্তা</button>
                            </div>
                        </div>
                        <div id="adjustment-controls">
                            <label>লেয়ার অ্যাডজাস্ট করুন</label>
                            <div class="adjustment-grid">
                                <button class="btn" id="move-up" title="Move Up"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 8l-6 6h12z"></path></svg></button>
                                <button class="btn" id="move-down" title="Move Down"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 16l6-6H6z"></path></svg></button>
                                <button class="btn" id="move-left" title="Move Left"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M15 12l-6-6v12z" transform="rotate(180 12 12)"></path></svg></button>
                                <button class="btn" id="move-right" title="Move Right"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M9 12l6-6v12z"></path></svg></button>
                                <button class="btn" id="scale-up" title="Scale Up"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"></path></svg></button>
                                <button class="btn" id="scale-down" title="Scale Down"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M19 13H5v-2h14v2z"></path></svg></button>
                            </div>
                        </div>
                    </div>
                </details>

                <details class="control-section">
                    <summary>Text & Font</summary>
                    <div class="control-section-content">
                        <div class="control-group">
                            <label for="name-input">আপনার নাম:</label>
                            <input type="text" id="name-input" placeholder="এখানে নাম লিখুন">
                            <label for="name-color-picker" style="margin-top:10px;">নামের রঙ:</label>
                            <input type="color" id="name-color-picker" value="#FFFFFF">
                        </div>
                        <div class="control-group">
                            <label for="status-select">শুভেচ্ছা বার্তা:</label>
                            <select id="status-select">
                                <option value="ঈদ মোবারক">ঈদ মোবারক</option><option value="Eid Mubarak">Eid Mubarak</option><option value="[custom]">নিজের বার্তা লিখুন</option><option value="">কোনো বার্তা নয়</option>
                            </select>
                            <input type="text" id="custom-status-input" placeholder="এখানে নিজের বার্তা লিখুন" style="display:none; margin-top: 10px;">
                            <label for="status-color-picker" style="margin-top:10px;">বার্তার রঙ:</label>
                            <input type="color" id="status-color-picker" value="#333333">
                        </div>
                        <div class="control-group">
                            <label for="font-select">ফন্ট স্টাইল:</label>
                            <select id="font-select"><option value="'Shokuntola', cursive" style="font-family:'Shokuntola'">শকুনতলা</option><option value="'Galada', cursive" style="font-family:'Galada'">গালাডা</option><option value="'Lobster', cursive" style="font-family:'Lobster'">লবস্টার</option><option value="'Hind Siliguri', sans-serif">হিন্দ শিলিগুঁড়ি</option></select>
                        </div>
                    </div>
                </details>

                <details class="control-section" open>
                    <summary>Frames</summary>
                    <div class="control-section-content">
                        <div class="frame-selection">
                            <img class="frame-option active" data-frame=""> <!-- Base64 Frame 1 -->
                            <img class="frame-option" data-frame=""> <!-- Base64 Frame 2 -->
                            <img class="frame-option" data-frame=""> <!-- Base64 Frame 3 -->
                            <img class="frame-option" data-frame=""> <!-- Base64 Frame 4 -->
                            <img class="frame-option" data-frame=""> <!-- Base64 Frame 5 -->
                        </div>
                    </div>
                </details>
            </aside>
        </main>
        
        <footer class="app-footer">
            <p>&copy; 2024 - Developed with ❤️ by Raju</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const getEl = id => document.getElementById(id);
        const query = sel => document.querySelector(sel);
        const queryAll = sel => document.querySelectorAll(sel);

        const posterContainer = getEl('poster-container');
        const userImageContainer = getEl('user-image-container');
        const userImage = getEl('user-image');
        const frameImage = getEl('frame-image');
        const statusText = getEl('status-text');
        const nameText = getEl('name-text');
        
        let selectedElement = null;

        getEl('image-upload').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const imageUrl = e.target.result;
                const tempImg = new Image();
                tempImg.onload = () => {
                    posterContainer.style.aspectRatio = `${tempImg.naturalWidth} / ${tempImg.naturalHeight}`;
                    userImage.src = imageUrl;
                    userImageContainer.style.display = 'block';
                    resetElementTransform(userImageContainer);
                    selectElement(userImageContainer);
                };
                tempImg.src = imageUrl;
            };
            reader.readAsDataURL(file);
        });

        function selectElement(element) {
            if (selectedElement) selectedElement.classList.remove('selected');
            queryAll('.layer-btn').forEach(btn => btn.classList.remove('active'));
            selectedElement = element;
            if (!selectedElement) {
                getEl('adjustment-controls').style.display = 'none';
                return;
            }
            selectedElement.classList.add('selected');
            const targetBtn = query(`.layer-btn[data-target="#${selectedElement.id}"]`);
            if (targetBtn) targetBtn.classList.add('active');
            getEl('adjustment-controls').style.display = 'block';
        }

        queryAll('.layer-btn').forEach(btn => btn.addEventListener('click', () => selectElement(query(btn.dataset.target))));
        posterContainer.addEventListener('click', (e) => { if (e.target === posterContainer) selectElement(null); });

        getEl('name-input').addEventListener('input', (e) => nameText.textContent = e.target.value || 'আপনার নাম');
        getEl('name-color-picker').addEventListener('input', (e) => nameText.style.color = e.target.value);
        getEl('status-select').addEventListener('change', (e) => {
            getEl('custom-status-input').style.display = e.target.value === '[custom]' ? 'block' : 'none';
            statusText.textContent = e.target.value === '[custom]' ? (getEl('custom-status-input').value || 'আপনার বার্তা') : e.target.value;
        });
        getEl('custom-status-input').addEventListener('input', (e) => statusText.textContent = e.target.value);
        getEl('status-color-picker').addEventListener('input', (e) => statusText.style.color = e.target.value);
        getEl('font-select').addEventListener('change', (e) => [statusText, nameText].forEach(el => el.style.fontFamily = e.target.value));

        queryAll('.frame-option').forEach(option => {
            const frameSrc = option.getAttribute('data-frame');
            if (frameSrc) option.src = frameSrc;
            option.addEventListener('click', () => {
                query('.frame-option.active')?.classList.remove('active');
                option.classList.add('active');
                frameImage.src = option.getAttribute('data-frame');
            });
        });
        query('.frame-option.active')?.click();

        function updateTransform(element) {
            const x = parseFloat(element.getAttribute('data-x')) || 0;
            const y = parseFloat(element.getAttribute('data-y')) || 0;
            const scale = parseFloat(element.getAttribute('data-scale')) || 1;
            element.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
        }
        function resetElementTransform(element) {
            Object.assign(element.style, { transform: 'translate(0px, 0px) scale(1)', width: '75%', height: '75%', top: '12.5%', left: '12.5%' });
            ['data-x', 'data-y'].forEach(attr => element.setAttribute(attr, '0'));
            element.setAttribute('data-scale', '1');
        }

        const adjust = (prop, value) => {
            if (!selectedElement) return;
            const current = parseFloat(selectedElement.getAttribute(prop)) || (prop === 'data-scale' ? 1 : 0);
            selectedElement.setAttribute(prop, current + value);
            updateTransform(selectedElement);
        };

        getEl('move-up').addEventListener('click', () => adjust('data-y', -10));
        getEl('move-down').addEventListener('click', () => adjust('data-y', 10));
        getEl('move-left').addEventListener('click', () => adjust('data-x', -10));
        getEl('move-right').addEventListener('click', () => adjust('data-x', 10));
        getEl('scale-up').addEventListener('click', () => adjust('data-scale', 0.1));
        getEl('scale-down').addEventListener('click', () => adjust('data-scale', -0.1));

        interact('.resizable-draggable')
            .draggable({ listeners: { move: event => { adjust('data-x', event.dx); adjust('data-y', event.dy); } }})
            .gesturable({ listeners: {
                move(event) {
                    if (!selectedElement) selectElement(event.target);
                    const scale = (parseFloat(selectedElement.getAttribute('data-scale')) || 1) * (1 + event.ds);
                    selectedElement.setAttribute('data-scale', scale);
                    updateTransform(selectedElement);
                }
            }})
            .on('tap', (event) => selectElement(event.currentTarget));
        
        getEl('download-btn').addEventListener('click', () => {
            selectElement(null);
            setTimeout(() => {
                html2canvas(posterContainer, { useCORS: true, scale: 3, backgroundColor: null }).then(canvas => {
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = 'eid_poster_with_raju.png';
                    link.click();
                }).catch(err => alert('দুঃখিত, ডাউনলোড করা যায়নি।'));
            }, 100);
        });
    });
    </script>
</body>
</html>
